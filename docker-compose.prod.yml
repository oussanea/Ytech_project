services:

  ollama:
    image: ollama/ollama
    container_name: ytech-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  chatbot:
    build: .
    container_name: ytech-chatbot
    ports:
      - "8501:8501"
    environment:
      DB_HOST: 192.168.56.25
      DB_PORT: 3306
      DB_NAME: ytech_chatbot
      DB_USER: chatbot
      DB_PASSWORD: ChatbotPass123!
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - /etc/ssl/ytech:/etc/ssl/ytech
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.sslCertFile=/etc/ssl/ytech/ytech.crt
      --server.sslKeyFile=/etc/ssl/ytech/ytech.key
    depends_on:
      - ollama
    restart: always

volumes:
  ollama_data:
