services:

  mariadb:
    image: mariadb:10
    container_name: ytech-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: RootPass123!
      MYSQL_DATABASE: ytech_chatbot
      MYSQL_USER: chatbot
      MYSQL_PASSWORD: ChatbotPass123!
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - ytech-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: ytech-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ytech-network
    restart: always

  chatbot:
    build: .
    container_name: ytech-chatbot
    ports:
      - "8501:8501"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ytech_chatbot
      DB_USER: chatbot
      DB_PASSWORD: ChatbotPass123!
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      mariadb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ytech-network
    restart: always

networks:
  ytech-network:
    driver: bridge

volumes:
  mariadb_data:
  ollama_data: