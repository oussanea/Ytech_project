services:

  mariadb:
    image: mariadb:10
    container_name: ytech-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: RootPass123!
      MYSQL_DATABASE: ytech_chatbot
      MYSQL_USER: chatbot
      MYSQL_PASSWORD: ChatbotPass123!
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always

volumes:
  mariadb_data:
